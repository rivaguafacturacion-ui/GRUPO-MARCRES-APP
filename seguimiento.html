<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Marcres · Seguimiento</title>
<style>
:root {
  --azul: #184595;
  --celeste: #03A0FB;
  --amarillo: #FFD700;
  --ok: #2D6A4F;
  --bg: #F0EDE8;
  --surface: #FAFAF7;
  --border: #D8D4CC;
  --text: #1A1916;
  --muted: #7A776F;
  --font: 'DM Sans', 'Helvetica Neue', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

.header {
  background: var(--azul);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo {
  width: 38px; height: 38px; border-radius: 8px;
  background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  color: var(--celeste); font-size: 20px; font-weight: 900;
}
.header-title { color: #fff; font-size: 15px; font-weight: 700; }
.header-sub { color: rgba(255,255,255,.6); font-size: 11px; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.btn-refresh {
  background: rgba(255,255,255,.15); color: #fff; border: none;
  border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 6px;
  transition: background .15s;
}
.btn-refresh:hover { background: rgba(255,255,255,.25); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4CAF50; display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.status-dot.error { background: #f44336; animation: none; }

.main { padding: 16px; max-width: 1100px; margin: 0 auto; }

/* Mapa */
#map-container {
  border-radius: 14px; overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 2px 16px rgba(0,0,0,.1);
  margin-bottom: 16px;
  height: 420px;
  background: #e8e0d8;
  position: relative;
}
#map { width: 100%; height: 100%; }
.map-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); gap: 8px; font-size: 14px;
}
.map-placeholder .icon { font-size: 40px; }

/* Tarjetas técnicos */
.tecnicos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.tecnico-card {
  background: var(--surface);
  border-radius: 12px;
  border: 1.5px solid var(--border);
  overflow: hidden;
  transition: box-shadow .15s;
}
.tecnico-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); }
.tecnico-card-header {
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.tecnico-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.tecnico-avatar.rivagua { background: #B7800A; }
.tecnico-avatar.marcres  { background: var(--azul); }
.tecnico-avatar.inactivo { background: #999; }
.tecnico-info { flex: 1; min-width: 0; }
.tecnico-nombre {
  font-size: 13px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tecnico-empresa {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; margin-top: 2px;
  padding: 2px 8px; border-radius: 99px; display: inline-block;
}
.tecnico-empresa.rivagua { background: #FFF3CD; color: #8B5A00; }
.tecnico-empresa.marcres  { background: #E3E8F5; color: var(--azul); }
.tecnico-empresa.inactivo { background: #F0F0F0; color: #999; }
.tecnico-card-body { padding: 10px 14px; }
.tecnico-row {
  display: flex; align-items: flex-start; gap: 6px;
  font-size: 12px; color: var(--muted); margin-bottom: 6px;
}
.tecnico-row:last-child { margin-bottom: 0; }
.tecnico-row b { color: var(--text); font-weight: 600; flex-shrink: 0; }
.tecnico-card-footer {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  display: flex; gap: 6px;
}
.btn-maps {
  flex: 1; padding: 7px; border-radius: 8px; border: none;
  background: var(--azul); color: #fff; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: opacity .15s;
}
.btn-maps:hover { opacity: .85; }
.btn-centrar {
  padding: 7px 12px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--surface);
  font-size: 12px; font-weight: 600; color: var(--muted);
  cursor: pointer; font-family: var(--font); transition: all .15s;
}
.btn-centrar:hover { border-color: var(--azul); color: var(--azul); }

/* Sin técnicos */
.empty-state {
  text-align: center; padding: 48px 20px; color: var(--muted);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 13px; line-height: 1.6; }

/* Barra de estado */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.status-info { font-size: 12px; color: var(--muted); }
.status-count {
  font-size: 13px; font-weight: 700; color: var(--azul);
  background: #E3E8F5; padding: 4px 12px; border-radius: 99px;
}
.last-update { font-size: 11px; color: var(--muted); }

/* Spinner */
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Config panel */
.config-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.config-label { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }
.config-input {
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 7px 12px; font-family: var(--font); font-size: 13px;
  color: var(--text); background: var(--bg); outline: none; flex: 1; min-width: 200px;
}
.config-input:focus { border-color: var(--azul); }
.btn-guardar {
  padding: 8px 16px; border-radius: 8px; border: none;
  background: var(--azul); color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font); white-space: nowrap;
}

@media (max-width: 600px) {
  #map-container { height: 280px; }
  .tecnicos-grid { grid-template-columns: 1fr; }
}

.notif-toast {
  position: fixed;
  top: 70px;
  right: 16px;
  z-index: 9999;
  background: #184595;
  color: #fff;
  padding: 12px 18px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
  font-size: 13px;
  font-weight: 600;
  max-width: 280px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideIn .3s ease;
  cursor: pointer;
}
.notif-toast.rivagua { background: #B7800A; }
@keyframes slideIn { from { transform: translateX(120%); opacity:0; } to { transform: translateX(0); opacity:1; } }
@keyframes slideOut { from { transform: translateX(0); opacity:1; } to { transform: translateX(120%); opacity:0; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">M</div>
    <div>
      <div class="header-title">Grupo Marcres · Seguimiento</div>
      <div class="header-sub">Panel de técnicos en tiempo real</div>
    </div>
  </div>
  <div class="header-right">
    <span class="status-dot" id="status-dot"></span>
    <button class="btn-refresh" onclick="cargarPosiciones()" id="btn-refresh">
      <span id="refresh-icon">🔄</span> Actualizar
    </button>
  </div>
</div>

<div class="main">

  <!-- Configuración URL GAS -->
  <div class="config-bar" id="config-bar">
    <span class="config-label">🔗 URL del GAS:</span>
    <input class="config-input" id="gas-url-input" placeholder="Pega aquí la URL de tu Google Apps Script..." value="">
    <button class="btn-guardar" onclick="guardarUrl()">Guardar</button>
  </div>

  <!-- Barra estado -->
  <div class="status-bar">
    <div>
      <span class="status-count" id="count-tecnicos">0 técnicos activos</span>
      <span class="last-update" id="last-update" style="margin-left:8px;"></span>
    </div>
    <div class="status-info">Se actualiza automáticamente cada 15 segundos</div>
  </div>

  <!-- Mapa -->
  <div id="map-container">
    <div id="map"></div>
    <div class="map-placeholder" id="map-placeholder">
      <div class="icon">🗺️</div>
      <div>Cargando mapa...</div>
    </div>
  </div>

  <!-- Tarjetas técnicos -->
  <div class="tecnicos-grid" id="tecnicos-grid"></div>

</div>

<script>
// -- CONFIG --------------------------------------------------
var GAS_URL = localStorage.getItem('marcres_gas_url') || '';
var map = null;
var markers = {};
var autoRefreshInterval = null;

// Mostrar URL guardada
document.getElementById('gas-url-input').value = GAS_URL;
if (GAS_URL) document.getElementById('config-bar').style.display = 'none';

function guardarUrl() {
  var url = document.getElementById('gas-url-input').value.trim();
  if (!url) { alert('Pega la URL del GAS primero'); return; }
  GAS_URL = url;
  localStorage.setItem('marcres_gas_url', url);
  document.getElementById('config-bar').style.display = 'none';
  cargarPosiciones();
}

// Mostrar config si no hay URL
document.getElementById('config-bar').style.display = GAS_URL ? 'none' : 'flex';

// -- MAPA (Leaflet OSM, sin API key) --------------------------
function initMapa() {
  if (map) return;
  // Cargar Leaflet dinámicamente
  var link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
  document.head.appendChild(link);

  var script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
  script.onload = function() {
    map = L.map('map').setView([38.35, -0.48], 10); // Alicante por defecto
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);
    document.getElementById('map-placeholder').style.display = 'none';
  };
  document.head.appendChild(script);
}

// -- ICONOS ---------------------------------------------------
function crearIcono(empresa, iniciales, activo) {
  var color  = activo ? (empresa === 'rivagua' ? '#B7800A' : '#184595') : '#888888';
  var bgRing = activo ? (empresa === 'rivagua' ? '#FFD700' : '#03A0FB') : '#BBBBBB';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="44" height="54" viewBox="0 0 44 54">'
    + '<ellipse cx="22" cy="50" rx="8" ry="4" fill="rgba(0,0,0,.2)"/>'
    + '<circle cx="22" cy="20" r="20" fill="' + color + '" stroke="' + bgRing + '" stroke-width="3"/>'
    + '<text x="22" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" font-family="Arial">' + iniciales + '</text>'
    + '<polygon points="14,36 22,52 30,36" fill="' + color + '"/>'
    + '</svg>';
  return L.divIcon({
    html: svg, className: '', iconSize: [44,54], iconAnchor: [22,52], popupAnchor: [0,-50]
  });
}

function getIniciales(nombre) {
  var partes = (nombre || '').split(' ').filter(Boolean);
  if (partes.length >= 2) return (partes[0][0] + partes[1][0]).toUpperCase();
  return (nombre || '?')[0].toUpperCase();
}

// -- NORMALIZAR COORDENADAS --------------------------------------
// Convierte cualquier formato a decimal con punto
// 38373110 → 38.373110 | 38,373110 → 38.373110 | 38.373110 → 38.373110
function normalizarCoordenada(val, esLat) {
  var n = parseFloat(String(val || '0').replace(',', '.'));
  if (isNaN(n) || n === 0) return null;
  // Si el valor absoluto es mayor que el máximo posible, dividir por 1M
  if (esLat  && Math.abs(n) > 90)  n = n / 1000000;
  if (!esLat && Math.abs(n) > 180) n = n / 1000000;
  return n;
}

// -- CARGAR POSICIONES ----------------------------------------
function cargarPosiciones() {
  if (!GAS_URL) return;

  var dot = document.getElementById('status-dot');
  var icon = document.getElementById('refresh-icon');
  icon.innerHTML = '<span class="spinner"></span>';

  fetch(GAS_URL + '?action=posiciones&t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      icon.textContent = '🔄';
      if (!data.ok) throw new Error(data.error || 'Error');
      dot.className = 'status-dot';
      renderizarTecnicos(data.posiciones || []);
      document.getElementById('last-update').textContent =
        'Última actualización: ' + new Date().toLocaleTimeString('es-ES');
    })
    .catch(function(e) {
      icon.textContent = '🔄';
      dot.className = 'status-dot error';
      console.error(e);
    });
}

function renderizarTecnicos(posiciones) {
  detectarNuevosTecnicos(posiciones);
  var grid = document.getElementById('tecnicos-grid');
  var count = document.getElementById('count-tecnicos');
  count.textContent = posiciones.length + (posiciones.length === 1 ? ' técnico activo' : ' técnicos activos');

  if (!posiciones.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">'
      + '<div class="empty-icon">👷</div>'
      + '<div class="empty-title">Sin técnicos activos</div>'
      + '<div class="empty-sub">Cuando un técnico pulse INICIO en la app,<br>su posición aparecerá aquí.</div>'
      + '</div>';
    return;
  }

  // Actualizar mapa
  if (map) {
    // Limpiar markers no activos
    Object.keys(markers).forEach(function(k) {
      if (!posiciones.find(function(p) { return p.tecnico === k; })) {
        map.removeLayer(markers[k]);
        delete markers[k];
      }
    });

    var bounds = [];
    posiciones.forEach(function(p) {
      var lat = normalizarCoordenada(p.lat, true);
      var lng = normalizarCoordenada(p.lng, false);
      if (!lat || !lng) return;
      bounds.push([lat, lng]);
      var iniciales = getIniciales(p.tecnico);
      var icono = crearIcono(p.empresa, iniciales, p.activo);
      var mapsUrlPopup = 'https://www.google.com/maps?q=' + lat.toFixed(6) + ',' + lng.toFixed(6) + '&z=17';
      var popupHtml = '<div style="font-family:Arial;min-width:160px;">'
        + '<div style="font-weight:700;font-size:13px;margin-bottom:4px;">' + p.tecnico + '</div>'
        + '<div style="font-size:11px;color:#888;margin-bottom:6px;">' + (p.empresa || '').toUpperCase() + '</div>'
        + (p.cliente ? '<div style="font-size:12px;margin-bottom:2px;">👥 ' + p.cliente + '</div>' : '<div style="font-size:12px;color:#aaa;font-style:italic;margin-bottom:2px;">Sin trabajo asignado</div>')
        + (p.tipo    ? '<div style="font-size:12px;margin-bottom:2px;">📋 ' + p.tipo + '</div>' : '')
        + '<div style="font-size:11px;color:#aaa;margin-top:6px;">🕐 ' + (p.timestamp || '') + '</div>'
        + '<div style="margin-top:8px;"><a href="' + mapsUrlPopup + '" target="_blank" style="font-size:12px;color:#184595;font-weight:600;">📍 Ver en Maps</a></div>'
        + '</div>';
      if (markers[p.tecnico]) {
        markers[p.tecnico].setLatLng([lat, lng]).setIcon(icono).setPopupContent(popupHtml);
      } else {
        markers[p.tecnico] = L.marker([lat, lng], { icon: icono })
          .bindPopup(popupHtml).addTo(map);
      }
    });
    if (bounds.length) map.fitBounds(bounds, { padding: [40,40], maxZoom: 15 });
  }

  // Renderizar tarjetas
  grid.innerHTML = posiciones.map(function(p) {
    var lat = normalizarCoordenada(p.lat, true);
    var lng = normalizarCoordenada(p.lng, false);
    if (!lat || !lng) return '';
    var empresa = (p.empresa || 'marcres').toLowerCase();
    var iniciales = getIniciales(p.tecnico);
    var mapsUrl = 'https://www.google.com/maps?q=' + lat.toFixed(6) + ',' + lng.toFixed(6) + '&z=17';
    var avatarClass = p.activo ? empresa : 'inactivo';
    var cardBorde = p.activo ? '' : 'border-color:#ddd;opacity:.75;';
    return '<div class="tecnico-card" style="' + cardBorde + '">'      + '<div class="tecnico-card-header">'      +   '<div class="tecnico-avatar ' + avatarClass + '">' + iniciales + '</div>'
      +   '<div class="tecnico-info">'
      +     '<div class="tecnico-nombre">' + p.tecnico + '</div>'
      +     '<span class="tecnico-empresa ' + (p.activo ? empresa : 'inactivo') + '">' + empresa + (p.activo ? '' : ' · sin parte') + '</span>'
      +   '</div>'
      + '</div>'
      + '<div class="tecnico-card-body">'
      + (p.cliente ? '<div class="tecnico-row"><b>👥</b> ' + p.cliente + '</div>' : '<div class="tecnico-row" style="color:var(--muted);font-style:italic;">Sin trabajo asignado</div>')
      + (p.tipo    ? '<div class="tecnico-row"><b>📋</b> ' + p.tipo + '</div>' : '')
      +   '<div class="tecnico-row"><b>📍</b> ' + p.lat + ', ' + p.lng + (p.precision ? '  <span style="color:#bbb">±' + p.precision + 'm</span>' : '') + '</div>'
      + (p.timestamp ? '<div class="tecnico-row"><b>🕐</b> ' + p.timestamp + '</div>' : '')
      + '</div>'
      + '<div class="tecnico-card-footer">'
      +   '<button class="btn-maps" onclick="window.open(\'' + mapsUrl + '\',\'_blank\')">📍 Ver en Maps</button>'
      +   '<button class="btn-centrar" onclick="centrarEnTecnico(\'' + p.tecnico + '\')">🎯</button>'
      +   '<button class="btn-centrar btn-borrar" style="color:#e53935;border-color:#e53935;" data-tecnico="' + p.tecnico.replace(/"/g,'&quot;') + '" onclick="borrarTecnicoBtn(this)">🗑️</button>'
      +   '<button class="btn-centrar" style="color:#2D6A4F;border-color:#2D6A4F;" data-tecnico="' + p.tecnico.replace(/"/g,'&quot;') + '" onclick="verRutaBtn(this)" title="Ver ruta">🗺️</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

function centrarEn(lat, lng) {
  var latN = normalizarCoordenada(lat, true);
  var lngN = normalizarCoordenada(lng, false);
  if (map && latN && lngN) {
    map.setView([latN, lngN], 17);
    // Abrir popup del marcador si existe
    Object.keys(markers).forEach(function(k) {
      var m = markers[k];
      if (Math.abs(m.getLatLng().lat - latN) < 0.001) m.openPopup();
    });
  }
}

function centrarEnTecnico(tecnico) {
  if (!map) return;
  var marker = markers[tecnico];
  if (marker) {
    map.setView(marker.getLatLng(), 17);
    marker.openPopup();
  }
}

// -- BORRAR TÉCNICO DEL PANEL ---------------------------------
function borrarTecnicoBtn(btn) {
  var tecnico = btn.getAttribute('data-tecnico');
  borrarTecnico(tecnico);
}

function borrarTecnico(tecnico) {
  if (!confirm('¿Eliminar a ' + tecnico + ' del panel? Volverá a aparecer cuando pulse INICIO.')) return;
  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ accion: 'offline', tecnico: tecnico })
  })
  .then(function() {
    // Quitar marcador del mapa
    if (markers[tecnico]) {
      map.removeLayer(markers[tecnico]);
      delete markers[tecnico];
    }
    // Recargar panel
    cargarPosiciones();
  })
  .catch(function(e) { console.error(e); });
}

// -- ARRANCAR -------------------------------------------------

// -- NOTIFICACIONES -------------------------------------------
var _tecnicosAnteriores = {};

function mostrarNotificacion(tecnico, empresa, cliente) {
  var toast = document.createElement('div');
  toast.className = 'notif-toast' + (empresa === 'rivagua' ? ' rivagua' : '');
  var primerNombre = tecnico.split(' ')[0];
  toast.innerHTML = ['🔔 <div><div>', primerNombre, ' inició un parte</div>',
    '<div style="font-size:11px;font-weight:400;opacity:.85;">', (cliente || ''), '</div></div>'].join('');
  toast.onclick = function() { toast.remove(); };
  document.body.appendChild(toast);

  // Sonido de notificación
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}

  // Auto-cerrar tras 6 segundos
  setTimeout(function() {
    toast.style.animation = 'slideOut .3s ease forwards';
    setTimeout(function() { toast.remove(); }, 300);
  }, 6000);
}

function detectarNuevosTecnicos(posicionesNuevas) {
  posicionesNuevas.forEach(function(p) {
    var key = p.tecnico;
    var anterior = _tecnicosAnteriores[key];
    // Notificar si es nuevo o si pasó de inactivo a activo
    if (p.activo && (!anterior || !anterior.activo)) {
      mostrarNotificacion(p.tecnico, p.empresa, p.cliente);
    }
    _tecnicosAnteriores[key] = { activo: p.activo };
  });
}

var rutaActual = null;
var rutaMarkers = [];

function verRutaBtn(btn) {
  var tecnico = btn.getAttribute('data-tecnico');
  // Mostrar selector de período
  var periodo = prompt('Periodo:\n1 = Hoy\n2 = Esta semana\nEscribe 1 o 2:', '1');
  if (!periodo) return;
  verRuta(tecnico, periodo === '2' ? 'semana' : 'hoy');
}

function verRuta(tecnico, periodo) {
  if (!GAS_URL || !map) return;
  limpiarRuta();
  fetch(GAS_URL + '?action=ruta&tecnico=' + encodeURIComponent(tecnico) + '&periodo=' + (periodo||'hoy') + '&t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok || !data.puntos.length) { alert('Sin historial de ruta para ' + tecnico); return; }
      var coords = [];
      data.puntos.forEach(function(p) {
        var lat = normalizarCoordenada(p.lat, true);
        var lng = normalizarCoordenada(p.lng, false);
        if (!lat || !lng) return;
        coords.push([lat, lng]);
        var iconoVerde = L.divIcon({
          html: '<div style="width:10px;height:10px;border-radius:50%;background:#2D6A4F;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);"></div>',
          className: '', iconSize: [10,10], iconAnchor: [5,5]
        });
        var ts = p.timestamp ? new Date(p.timestamp).toLocaleTimeString('es-ES') : '';
        var mk = L.marker([lat,lng], { icon: iconoVerde })
          .bindPopup('<div style="font-family:Arial;font-size:12px;min-width:140px;"><b style="color:#2D6A4F;">Ruta: ' + p.tecnico + '</b><br>' + (p.cliente ? '👥 ' + p.cliente + '<br>' : '') + (ts ? '🕐 ' + ts : '') + '</div>')
          .addTo(map);
        rutaMarkers.push(mk);
      });
      if (coords.length > 1) {
        rutaActual = L.polyline(coords, { color: '#2D6A4F', weight: 3, opacity: 0.7, dashArray: '6,4' }).addTo(map);
        map.fitBounds(rutaActual.getBounds(), { padding: [30,30] });
      } else if (coords.length === 1) { map.setView(coords[0], 15); }
    }).catch(function(e) { console.error(e); });
}

function limpiarRuta() {
  if (rutaActual) { map.removeLayer(rutaActual); rutaActual = null; }
  rutaMarkers.forEach(function(m) { map.removeLayer(m); });
  rutaMarkers = [];
}

initMapa();
if (GAS_URL) cargarPosiciones();

// Auto-refresh cada 60 segundos
autoRefreshInterval = setInterval(cargarPosiciones, 15 * 1000); // cada 15 segundos

// Mostrar config si el usuario quiere cambiar la URL
document.querySelector('.header-logo').addEventListener('click', function() {
  var bar = document.getElementById('config-bar');
  bar.style.display = bar.style.display === 'none' ? 'flex' : 'none';
});
</script>
</body>
